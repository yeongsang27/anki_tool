<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>암기 파일 정리함</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Pretendard:wght@300;400;500;600;700&display=swap');

/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root {
  /* Library (light) */
  --lib-bg: #f4f1ec;
  --lib-surface: #ffffff;
  --lib-surface2: #ede9e2;
  --lib-border: #ddd8cf;
  --lib-border-hi: #c8c0b4;
  --lib-text: #1c1916;
  --lib-mid: #6b6259;
  --lib-muted: #a89e93;
  --lib-accent: #2d5be3;
  --lib-accent-bg: #edf1fd;

  /* Study (dark) */
  --bg: #0b0d12;
  --surface: #12151c;
  --surface2: #1a1e28;
  --border: #1e2335;
  --border-hi: #272d42;
  --text: #dde3f0;
  --mid: #6b7494;
  --muted: #3d4460;
  --accent: #4f8ef7;
  --accent-dim: rgba(79,142,247,0.14);
  --ok: #26c6a0;
  --danger: #ef5350;
  --warn: #ffb74d;
  --mask-bg: #18244a;
  --mask-bd: #2d4494;
  --ga:#ef5350;--gb:#ff9800;--gc:#26c6a0;--gd:#4f8ef7;--ge:#ab47bc;

  --mono: 'DM Mono', monospace;
  --sans: 'Pretendard', -apple-system, sans-serif;
  --ease: cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--sans); -webkit-font-smoothing: antialiased; overflow: hidden; }
/* 아이패드 터치 최적화 */
button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
#canvas-panel { touch-action: none; }
.mask-box { touch-action: none; }

/* ═══════════════════════════════════════
   TOP-LEVEL SCREENS
═══════════════════════════════════════ */
#screen-library,
#screen-study {
  position: fixed; inset: 0;
  transition: opacity .3s var(--ease), transform .3s var(--ease);
}
#screen-library { background: var(--lib-bg); color: var(--lib-text); z-index: 10; }
#screen-study   { background: var(--bg);     color: var(--text);     z-index: 5;  }

#screen-library.hidden { opacity: 0; pointer-events: none; transform: translateY(-12px); }
#screen-study.hidden   { opacity: 0; pointer-events: none; }

/* ═══════════════════════════════════════
   ── LIBRARY SCREEN ──
═══════════════════════════════════════ */
#lib-root { display: flex; height: 100vh; overflow: hidden; }

/* sidebar */
#lib-sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--lib-surface);
  border-right: 1px solid var(--lib-border);
  display: flex; flex-direction: column; overflow: hidden;
}
#lib-sidebar-head {
  padding: 18px 16px 12px;
  border-bottom: 1px solid var(--lib-border);
}
#lib-sidebar-head h1 {
  font-size: 13px; font-weight: 700; letter-spacing: -.01em;
}
#lib-sidebar-head p {
  font-size: 10px; color: var(--lib-muted);
  font-family: var(--mono); margin-top: 2px;
}
#folder-tree { flex: 1; overflow-y: auto; padding: 8px 10px; }
#folder-tree::-webkit-scrollbar { width: 3px; }
#folder-tree::-webkit-scrollbar-thumb { background: var(--lib-border); border-radius: 99px; }

.folder-row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 6px; cursor: pointer;
  font-size: 12px; color: var(--lib-mid); transition: all .12s;
  user-select: none; border: 1.5px solid transparent;
}
.folder-row:hover { background: var(--lib-surface2); color: var(--lib-text); }
.folder-row.active { background: var(--lib-accent-bg); color: var(--lib-accent); }
.folder-row.drop-target { border-color: var(--lib-accent); background: var(--lib-accent-bg); }
.f-icon { font-size: 13px; flex-shrink: 0; }
.f-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.f-count {
  font-family: var(--mono); font-size: 9px; color: var(--lib-muted);
  background: var(--lib-surface2); padding: 1px 5px; border-radius: 99px;
}
.folder-row.active .f-count { background: rgba(45,91,227,.12); color: var(--lib-accent); }

.add-folder-btn {
  display: flex; align-items: center; gap: 5px;
  width: 100%; padding: 5px 8px; border-radius: 6px; margin: 2px 0;
  border: 1.5px dashed var(--lib-border); background: transparent;
  color: var(--lib-muted); font-size: 11px; cursor: pointer;
  font-family: var(--sans); transition: all .12s;
}
.add-folder-btn:hover { border-color: var(--lib-accent); color: var(--lib-accent); background: var(--lib-accent-bg); }

#new-folder-row {
  display: none; align-items: center; gap: 5px;
  padding: 3px 10px; margin-bottom: 2px;
}
#new-folder-row.show { display: flex; }
#new-folder-input {
  flex: 1; background: var(--lib-surface); border: 1px solid var(--lib-accent);
  border-radius: 5px; color: var(--lib-text); padding: 4px 7px;
  font-size: 12px; font-family: var(--sans); outline: none;
}
.nfi-btn {
  width: 22px; height: 22px; border-radius: 4px; border: none;
  cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center;
}
.nfi-ok { background: var(--lib-accent); color: #fff; }
.nfi-cancel { background: var(--lib-surface2); color: var(--lib-mid); }

#lib-sidebar-bottom {
  padding: 10px; border-top: 1px solid var(--lib-border);
  display: flex; flex-direction: column; gap: 5px;
}
.connect-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px; border-radius: 6px; border: 1px solid var(--lib-border);
  background: transparent; color: var(--lib-mid); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--sans); transition: all .15s;
}
.connect-btn:hover { border-color: var(--lib-accent); color: var(--lib-accent); background: var(--lib-accent-bg); }
.connect-btn.connected { background: #e8f5ee; color: #1a7a4a; border-color: rgba(26,122,74,.25); }
#fs-status { font-size: 10px; color: var(--lib-muted); text-align: center; font-family: var(--mono); }

/* main content */
#lib-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#lib-topbar {
  height: 50px; display: flex; align-items: center; gap: 10px; padding: 0 18px;
  background: var(--lib-surface); border-bottom: 1px solid var(--lib-border); flex-shrink: 0;
}
#lib-breadcrumb {
  flex: 1; display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--lib-muted);
}
#lib-breadcrumb strong { color: var(--lib-text); font-weight: 600; }
.bc-sep { color: var(--lib-border-hi); }

.lib-btn {
  height: 30px; padding: 0 13px; border-radius: 6px;
  border: 1px solid var(--lib-border); background: transparent;
  color: var(--lib-mid); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--sans); transition: all .15s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.lib-btn:hover { border-color: var(--lib-accent); color: var(--lib-accent); background: var(--lib-accent-bg); }
.lib-btn.primary { background: var(--lib-accent); color: #fff; border-color: var(--lib-accent); }
.lib-btn.primary:hover { filter: brightness(1.1); }
.lib-btn.danger:hover { border-color: #d94f3c; color: #d94f3c; background: rgba(217,79,60,.06); }

#view-btns { display: flex; gap: 2px; }
.vb {
  width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--lib-border);
  background: transparent; cursor: pointer; color: var(--lib-muted);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  transition: all .12s;
}
.vb.active { background: var(--lib-text); color: var(--lib-bg); border-color: var(--lib-text); }

#lib-search-wrap { position: relative; }
#lib-search {
  height: 28px; padding: 0 8px 0 28px; border-radius: 6px;
  border: 1px solid var(--lib-border); background: var(--lib-surface2);
  color: var(--lib-text); font-size: 11px; font-family: var(--sans);
  outline: none; width: 160px; transition: all .15s;
}
#lib-search:focus { border-color: var(--lib-accent); background: var(--lib-surface); width: 200px; }
#lib-search-icon {
  position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  color: var(--lib-muted); font-size: 11px; pointer-events: none;
}

#lib-file-area { flex: 1; overflow-y: auto; padding: 18px; }
#lib-file-area::-webkit-scrollbar { width: 5px; }
#lib-file-area::-webkit-scrollbar-thumb { background: var(--lib-border); border-radius: 99px; }

/* empty state */
#lib-empty {
  display: none; height: 100%; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; color: var(--lib-muted);
}
#lib-empty.show { display: flex; }
#lib-empty .es-icon { font-size: 44px; opacity: .35; }
#lib-empty p { font-size: 13px; }
.es-btn {
  padding: 8px 20px; border-radius: 7px; border: 1.5px dashed var(--lib-border-hi);
  background: transparent; color: var(--lib-mid); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--sans); transition: all .15s;
}
.es-btn:hover { border-color: var(--lib-accent); color: var(--lib-accent); background: var(--lib-accent-bg); }

/* grid */
#lib-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 13px;
}
#lib-grid.hidden { display: none; }

.file-card {
  background: var(--lib-surface); border: 1px solid var(--lib-border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: all .15s; position: relative;
  animation: fadeUp .2s var(--ease);
}
.file-card:hover { border-color: var(--lib-border-hi); box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-2px); }
.file-card.selected { border-color: var(--lib-accent); box-shadow: 0 0 0 2px rgba(45,91,227,.15); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.fc-thumb {
  aspect-ratio: 4/3; background: var(--lib-surface2);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  position: relative;
}
.fc-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; }
.file-card:hover .fc-thumb img { transform: scale(1.05); }
.fc-type { font-size: 30px; opacity: .45; }
.fc-thumb.t-pdf { background: linear-gradient(135deg,#fff5f5,#ffe0e0); }
.fc-thumb.t-pdf .fc-type { opacity: .7; }

.fc-info { padding: 8px 10px 10px; }
.fc-name {
  font-size: 11px; font-weight: 600; color: var(--lib-text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px;
}
.fc-meta { font-size: 10px; color: var(--lib-muted); font-family: var(--mono); }

/* open badge */
.fc-open-badge {
  position: absolute; inset: 0;
  background: rgba(45,91,227,.55); backdrop-filter: blur(2px);
  display: none; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 700; gap: 5px;
}
.file-card:hover .fc-open-badge { display: flex; }

.fc-check {
  position: absolute; top: 6px; left: 6px;
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid rgba(255,255,255,.6); background: rgba(0,0,0,.2);
  display: none; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 10px; font-weight: 700; z-index: 5;
}
.file-card:hover .fc-check,
.file-card.selected .fc-check { display: flex; }
.file-card.selected .fc-check { background: var(--lib-accent); border-color: var(--lib-accent); }

/* list view */
#lib-list { display: none; flex-direction: column; gap: 1px; }
#lib-list.show { display: flex; }

.list-hd {
  display: grid; grid-template-columns: 28px 1fr 70px 90px 80px;
  padding: 5px 10px; border-radius: 5px;
  font-size: 9px; font-weight: 600; color: var(--lib-muted);
  letter-spacing: .06em; text-transform: uppercase;
  background: var(--lib-surface2); margin-bottom: 3px;
}
.file-row {
  display: grid; grid-template-columns: 28px 1fr 70px 90px 80px;
  padding: 7px 10px; border-radius: 7px; background: var(--lib-surface);
  border: 1px solid transparent; cursor: pointer; transition: all .1s;
  align-items: center; animation: fadeUp .15s var(--ease);
}
.file-row:hover { border-color: var(--lib-border); background: var(--lib-surface2); }
.file-row.selected { border-color: var(--lib-accent); background: var(--lib-accent-bg); }
.fr-icon { font-size: 16px; }
.fr-name { font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
.fr-ext, .fr-size, .fr-date { font-size: 10px; color: var(--lib-muted); font-family: var(--mono); }

/* selection bar */
#sel-bar {
  display: none; position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--lib-text); color: var(--lib-bg); border-radius: 10px;
  padding: 9px 16px; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18); z-index: 200; white-space: nowrap;
  font-size: 12px; font-weight: 600;
}
#sel-bar.show { display: flex; }
.sb-action {
  padding: 4px 11px; border-radius: 5px; border: none;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--sans);
}
.sb-move { background: rgba(255,255,255,.15); color: #fff; }
.sb-move:hover { background: rgba(255,255,255,.25); }
.sb-del  { background: rgba(239,83,80,.25); color: #ff8a85; }
.sb-del:hover  { background: rgba(239,83,80,.4); }
.sb-clear { background: transparent; color: rgba(255,255,255,.5); }
.sb-clear:hover { color: #fff; }

/* move modal */
#move-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(28,25,22,.55); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#move-modal.open { display: flex; }
#move-box {
  background: var(--lib-surface); border: 1px solid var(--lib-border);
  border-radius: 12px; padding: 22px; width: 320px;
  box-shadow: 0 16px 48px rgba(0,0,0,.14);
  display: flex; flex-direction: column; gap: 12px;
}
#move-box h3 { font-size: 14px; font-weight: 700; }
#move-box p  { font-size: 12px; color: var(--lib-muted); }
#move-folder-list { display: flex; flex-direction: column; gap: 3px; max-height: 200px; overflow-y: auto; }
.mv-opt {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
  border: 1px solid transparent; transition: all .1s; background: transparent;
  color: var(--lib-mid); font-family: var(--sans); width: 100%;
}
.mv-opt:hover { background: var(--lib-surface2); border-color: var(--lib-border); }
.mv-opt.active { background: var(--lib-accent-bg); color: var(--lib-accent); border-color: rgba(45,91,227,.2); }
.mv-actions { display: flex; gap: 8px; justify-content: flex-end; }
.mv-actions button {
  padding: 7px 16px; border-radius: 6px; border: none;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--sans);
}
.mv-cancel  { background: var(--lib-surface2); color: var(--lib-text); }
.mv-confirm { background: var(--lib-accent);   color: #fff; }

/* global drop overlay */
#drop-glow {
  display: none; position: fixed; inset: 0; z-index: 900;
  border: 3px dashed var(--lib-accent); background: rgba(45,91,227,.06);
  pointer-events: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
#drop-glow.show { display: flex; }
#drop-glow p { font-size: 18px; font-weight: 700; color: var(--lib-accent); }

/* ═══════════════════════════════════════
   ── STUDY SCREEN ──
═══════════════════════════════════════ */
#study-root { display: flex; flex-direction: column; height: 100vh; }

/* study topbar */
#study-topbar {
  height: 46px; display: flex; align-items: center; gap: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; padding: 0 10px;
}
.stb-back {
  height: 28px; padding: 0 10px; border-radius: 5px;
  border: 1px solid var(--border); background: transparent;
  color: var(--mid); cursor: pointer; font-size: 11px; font-weight: 700;
  font-family: var(--sans); transition: all .15s;
  display: flex; align-items: center; gap: 4px; margin-right: 10px;
}
.stb-back:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
#stb-filename {
  font-family: var(--mono); font-size: 11px; color: var(--mid);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-right: 10px; border-right: 1px solid var(--border); margin-right: 10px;
}

.tb-btn {
  height: 28px; padding: 0 11px; border-radius: 5px;
  border: 1px solid var(--border); background: transparent;
  color: var(--mid); cursor: pointer; font-size: 11px; font-weight: 700;
  font-family: var(--sans); transition: all .15s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tb-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(239,83,80,.1); }
.tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 7px; flex-shrink: 0; }
.tb-spc { flex: 1; }
.tb-group { display: flex; align-items: center; gap: 5px; }
#page-info { font-family: var(--mono); font-size: 11px; color: var(--mid); white-space: nowrap; }

.group-dot {
  width: 21px; height: 21px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  color: #fff; transition: all .12s;
}
.group-dot[data-g="A"]{background:var(--ga);}
.group-dot[data-g="B"]{background:var(--gb);}
.group-dot[data-g="C"]{background:var(--gc);}
.group-dot[data-g="D"]{background:var(--gd);}
.group-dot[data-g="E"]{background:var(--ge);}
.group-dot.selected { border-color: #fff; transform: scale(1.15); }

/* study main */
#study-main { flex: 1; display: flex; overflow: hidden; }

/* canvas panel */
#canvas-panel {
  flex: 1; position: relative; overflow: hidden;
  background: #07080d; user-select: none;
  display: flex; align-items: center; justify-content: center;
}
#canvas-wrap { position: absolute; }
#pdf-canvas  { display: block; }
#mask-layer  { position: absolute; top: 0; left: 0; pointer-events: none; }
#drag-overlay{ position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
#drag-rect   { position: absolute; border: 2px dashed var(--accent); background: rgba(79,142,247,.12); display: none; pointer-events: none; }

/* zoom */
#zoom-ctrls {
  position: absolute; bottom: 12px; right: 12px;
  display: none; flex-direction: column; gap: 3px; z-index: 60;
}
#zoom-ctrls.show { display: flex; }
.zoom-btn {
  width: 27px; height: 27px; border-radius: 5px;
  background: rgba(18,21,28,.9); border: 1px solid var(--border-hi);
  color: var(--text); font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .12s; backdrop-filter: blur(6px); line-height: 1;
}
.zoom-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
#zoom-level { font-family: var(--mono); font-size: 9px; color: var(--muted); text-align: center; }

/* side panel */
#study-side {
  width: 220px; flex-shrink: 0; background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#quiz-block {
  padding: 12px 12px 10px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.qb-lbl { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
.qb-row { display: flex; gap: 5px; }
.q-btn {
  flex: 1; padding: 6px 0; border-radius: 5px; border: none;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--sans); transition: all .15s;
}
.q-btn.qa { background: var(--ok); color: #071a10; }
.q-btn.qa:hover { filter: brightness(1.1); }
.q-btn.qh { background: var(--border-hi); color: var(--text); }
.q-btn.qh:hover { background: #2a3045; }
.q-btn.qp { background: transparent; border: 1px solid var(--border-hi); color: var(--mid); }
.q-btn.qp:hover { border-color: var(--accent); color: var(--accent); }
.q-btn.qn { background: var(--accent); color: #fff; }
.q-btn.qn:hover { filter: brightness(1.1); }
#kb-hint { font-size: 10px; color: var(--muted); text-align: center; font-family: var(--mono); }
.kbd { display: inline-block; padding: 1px 5px; border-radius: 3px; background: var(--border); font-size: 9px; color: var(--mid); }

#box-list-wrap { flex: 1; overflow-y: auto; padding: 9px 11px; }
#box-list-wrap::-webkit-scrollbar { width: 3px; }
#box-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
.bl-title { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px; }
#box-list { display: flex; flex-direction: column; gap: 3px; }

.box-item {
  display: flex; align-items: center; gap: 6px; padding: 5px 7px;
  border-radius: 5px; border: 1px solid transparent; cursor: pointer;
  transition: all .12s; background: var(--bg);
}
.box-item:hover { border-color: var(--border-hi); }
.box-item.revealed { opacity: .4; }
.bi-num { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--mid); min-width: 16px; }
.bi-lbl { font-size: 11px; flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bi-grp { font-family: var(--mono); font-size: 8px; font-weight: 700; width: 14px; height: 14px; border-radius: 3px; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
.bi-state { font-size: 10px; flex-shrink: 0; opacity: .7; }
.bi-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 2px; opacity: 0; transition: opacity .1s, color .1s; }
.box-item:hover .bi-del { opacity: 1; }
.bi-del:hover { color: var(--danger); }

/* mask boxes */
.mask-box {
  position: absolute; border: 1.5px solid var(--mask-bd);
  background: var(--mask-bg); cursor: pointer;
  transition: background .2s, border-color .2s, box-shadow .2s;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.mask-box:hover { border-color: var(--accent); }
.mask-box.revealed { background: transparent; border-color: rgba(79,142,247,.3); border-style: dashed; }

/* 하이라이트: 아직 안 열린 상태 - 테두리 강조 */
.mask-box.highlighted {
  border-color: var(--warn);
  border-width: 2.5px;
  box-shadow: 0 0 0 3px rgba(255,183,77,.25), 0 0 16px rgba(255,183,77,.15);
  animation: pulse-highlight 1.4s ease-in-out infinite;
}
/* 하이라이트 + 열린 상태 */
.mask-box.highlighted.revealed {
  border-color: var(--ok);
  border-width: 2px;
  border-style: dashed;
  box-shadow: 0 0 0 3px rgba(38,198,160,.2);
  animation: none;
}
@keyframes pulse-highlight {
  0%,100% { box-shadow: 0 0 0 3px rgba(255,183,77,.25), 0 0 12px rgba(255,183,77,.1); }
  50%      { box-shadow: 0 0 0 5px rgba(255,183,77,.4),  0 0 20px rgba(255,183,77,.25); }
}
.mb-lbl { font-family: var(--mono); font-size: 10px; font-weight: 700; color: rgba(255,255,255,.45); pointer-events: none; }
.mask-box.revealed .mb-lbl { display: none; }
/* 하이라이트된 박스엔 번호 더 잘 보이게 */
.mask-box.highlighted .mb-lbl { color: rgba(255,183,77,.9); font-size: 11px; }
.mb-badge {
  position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; border-radius: 2px;
  font-family: var(--mono); font-size: 7px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; color: #fff; pointer-events: none;
}
.mb-memo-btn {
  position: absolute; bottom: 2px; right: 2px; width: 13px; height: 13px; border-radius: 3px;
  background: rgba(255,255,255,.1); border: none; color: rgba(255,255,255,.35);
  font-size: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  pointer-events: all; transition: all .12s;
}
.mb-memo-btn:hover, .mask-box.has-memo .mb-memo-btn { color: var(--warn); background: rgba(255,183,77,.15); }

/* memo popup */
#memo-popup {
  display: none; position: fixed; z-index: 900;
  background: var(--surface); border: 1px solid var(--border-hi);
  border-radius: 8px; padding: 11px; width: 230px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6); flex-direction: column; gap: 7px;
}
#memo-popup.open { display: flex; }
#memo-popup h4 { font-family: var(--mono); font-size: 9px; color: var(--mid); letter-spacing: .06em; text-transform: uppercase; }
#memo-ta {
  background: var(--bg); border: 1px solid var(--border-hi);
  border-radius: 5px; color: var(--text); padding: 7px;
  font-size: 11px; font-family: var(--sans); outline: none;
  resize: vertical; min-height: 70px;
}
#memo-ta:focus { border-color: var(--warn); }
.memo-acts { display: flex; gap: 5px; justify-content: flex-end; }
.memo-acts button { padding: 4px 11px; border-radius: 5px; border: none; font-size: 10px; font-weight: 700; cursor: pointer; font-family: var(--sans); }
.m-cancel { background: var(--border); color: var(--text); }
.m-save { background: var(--warn); color: #1a0f00; }

/* context menu */
#ctx-menu {
  display: none; position: fixed; z-index: 950;
  background: var(--surface); border: 1px solid var(--border-hi);
  border-radius: 7px; padding: 4px; min-width: 148px;
  box-shadow: 0 6px 24px rgba(0,0,0,.5);
}
#ctx-menu.open { display: block; }
.ctx-item {
  padding: 6px 11px; font-size: 11px; border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  color: var(--text); transition: background .1s;
}
.ctx-item:hover { background: var(--border); }
.ctx-item.danger { color: var(--danger); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }
.ctx-grp-row { padding: 4px 11px; display: flex; gap: 4px; align-items: center; }
.ctx-grp-row .cgl { font-size: 9px; color: var(--muted); margin-right: 2px; }
.cg-btn {
  width: 17px; height: 17px; border-radius: 3px; border: none;
  cursor: pointer; font-family: var(--mono); font-size: 8px; font-weight: 700;
  color: #fff; transition: transform .1s;
}
.cg-btn:hover { transform: scale(1.15); }
.cg-btn[data-g="none"]{background:var(--border-hi);}
.cg-btn[data-g="A"]{background:var(--ga);}
.cg-btn[data-g="B"]{background:var(--gb);}
.cg-btn[data-g="C"]{background:var(--gc);}
.cg-btn[data-g="D"]{background:var(--gd);}
.cg-btn[data-g="E"]{background:var(--ge);}

/* IO overlay */
#io-overlay {
  display: none; position: fixed; inset: 0; z-index: 1100;
  background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#io-overlay.open { display: flex; }
#io-box {
  background: var(--surface); border: 1px solid var(--border-hi);
  border-radius: 11px; padding: 22px; width: 380px;
  display: flex; flex-direction: column; gap: 13px;
}
#io-box h3 { font-size: 13px; font-weight: 700; font-family: var(--mono); }
#io-ta {
  background: var(--bg); border: 1px solid var(--border-hi);
  border-radius: 6px; color: var(--text); padding: 9px;
  font-size: 11px; font-family: var(--mono); outline: none;
  resize: vertical; height: 140px;
}
#io-ta:focus { border-color: var(--accent); }
.io-acts { display: flex; gap: 7px; justify-content: flex-end; }
.io-acts button { padding: 6px 14px; border-radius: 6px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--sans); }
.io-cancel { background: var(--border); color: var(--text); }
.io-export { background: var(--ok); color: #071a10; }
.io-import { background: var(--accent); color: #fff; }

/* global toast */
#toast {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--lib-text); color: var(--lib-bg);
  border-radius: 7px; padding: 7px 16px; font-size: 12px; font-weight: 600;
  opacity: 0; transition: all .25s; z-index: 2000; pointer-events: none;
  font-family: var(--mono); white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#screen-study #toast { background: var(--surface); color: var(--text); border: 1px solid var(--border-hi); }

/* loading spinner */
#pdf-loading {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  background: rgba(7,8,13,.85); z-index: 100; flex-direction: column; gap: 10px;
}
#pdf-loading.show { display: flex; }
#pdf-loading p { font-family: var(--mono); font-size: 11px; color: var(--mid); }
.spinner {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid var(--border); border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#fs-poll-status { animation: pulse-dot 2.5s ease-in-out infinite; }
@keyframes pulse-dot {
  0%,100% { opacity: .5; } 50% { opacity: 1; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ═══════════════════════════════════ LIBRARY SCREEN ═══ -->
<div id="screen-library">

  <div id="drop-glow">

        </div>

  <!-- SELECTION BAR -->

<!-- ═══════════════════════════════════ STUDY SCREEN ═══ -->

  <!-- MEMO POPUP -->

<script>
// ╔══════════════════════════════════════════╗
// ║  SHARED STATE                            ║
// ╚══════════════════════════════════════════╝
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const LIB_KEY   = 'amki_library_v1';
const BOXES_KEY = 'amki_boxes_v1';

// ── Supabase 설정 ──
const SB_URL = 'https://anzcqsadjftzunkvjext.supabase.co';
const SB_KEY = 'sb_publishable_xTOTOEol4NYegMynqtyv8g_hyEJxSO-';
let sbOnline = false;  // Supabase 연결 상태

async function sbFetch(path, opts = {}) {
  const res = await fetch(SB_URL + '/rest/v1' + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// 동기화 상태 표시
function setSyncStatus(status) {
  // status: 'syncing' | 'ok' | 'offline'
  const icons = { syncing: '🔄', ok: '☁️', offline: '💾' };
  const labels = { syncing: '동기화 중...', ok: 'Cloud 저장됨', offline: '로컬 저장' };
  let el = document.getElementById('sync-indicator');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-indicator';
    el.style.cssText = 'position:fixed;bottom:12px;right:12px;z-index:1500;font-size:11px;font-family:var(--mono);background:rgba(18,21,28,.85);color:var(--mid);padding:4px 10px;border-radius:99px;border:1px solid var(--border);backdrop-filter:blur(6px);transition:opacity .3s;pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent = (icons[status] || '') + ' ' + (labels[status] || '');
  el.style.opacity = '1';
  if (status === 'ok') setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

// ── Library state ──
let libState = {
  folders: [],
  files: [],   // {id, name, type, size, addedAt, folderId, dataURL}
  nextId: 1
};
let currentFolder = '__all__';
let selectedFiles  = new Set();
let currentView    = 'grid';
let searchQuery    = '';
let moveDest       = null;
let fsRootHandle   = null;

// ── Study state ──
let pdfDoc         = null;
let currentPage    = 1;
let totalPages     = 0;
let renderScale    = 1.8;
let displayScale   = 1.0;
let offsetX = 0, offsetY = 0;
let canvasW = 0, canvasH = 0;
let isImgMode      = false;
let currentMode    = 'draw';
let selectedGroup  = null;
let groupFilter    = 'all';
let isDragging     = false, dragStart = null;
let isPanning      = false, panStart  = null;
let seqIndex       = -1;
let ctxTarget      = null;
let memoTarget     = null;
let ioMode         = 'export';
let boxNextId      = 1;
let activeFileId   = null;   // which library file is open in study

// boxes keyed by fileId_pageNum
let boxes = {};

// ╔══════════════════════════════════════════╗
// ║  INIT                                    ║
// ╚══════════════════════════════════════════╝
(async () => {
  await loadLib();
  await loadBoxes();
  renderLibrary();
  tryRestoreFSHandle();
})();

// global drag-drop for library
document.addEventListener('dragover', e => {
  if (document.getElementById('screen-library').classList.contains('hidden')) return;
  e.preventDefault();
  document.getElementById('drop-glow').classList.add('show');
});
document.addEventListener('dragleave', e => {
  if (e.relatedTarget === null)
    document.getElementById('drop-glow').classList.remove('show');
});
document.addEventListener('drop', e => {
  if (document.getElementById('screen-library').classList.contains('hidden')) return;
  e.preventDefault();
  document.getElementById('drop-glow').classList.remove('show');
  handleFiles(e.dataTransfer.files);
});
document.getElementById('file-input').addEventListener('change', e => {
  handleFiles(e.target.files);
  e.target.value = '';
});
document.getElementById('new-folder-input').addEventListener('keydown', e => {
  if (e.key === 'Enter')  confirmNewFolder();
  if (e.key === 'Escape') cancelNewFolder();
});

// ╔══════════════════════════════════════════╗
// ║  SCREEN NAVIGATION                       ║
// ╚══════════════════════════════════════════╝
function openStudy(fileId) {
  activeFileId = fileId;
  const f = libState.files.find(f => f.id === fileId);
  if (!f) return;

  document.getElementById('stb-filename').textContent = f.name;

async function handleFiles(fileList) {

  for (const file of fileList) await addLibFile(file, target);
  await saveLib();
  renderLibrary();
  toast(`${fileList.length}개 파일 추가됨`);
}

async function addLibFile(file, folderId, fsLinked = false) {
  const dataURL = await fileToDataURL(file);
  libState.files.push({
    id: 'f' + libState.nextId++,
    name: file.name,
    type: file.type || guessType(file.name),
    size: file.size,
    addedAt: new Date().toISOString(),
    folderId: folderId || '__unfiled__',
    dataURL,
    fsLinked
  });
}

function fileToDataURL(file) {
  return new Promise((res) => {
    // 이미지는 20MB, PDF는 제한 없이 전부 읽기 (공부에 필수)
    const isImg = file.type?.startsWith('image/');
    const isPDF = file.type === 'application/pdf' || file.name?.toLowerCase().endsWith('.pdf');
    if (!isImg && !isPDF && file.size > 10 * 1024 * 1024) {
      return res('__large__');
    }
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => res('__error__');
    r.readAsDataURL(file);
  });
}

function guessType(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const m = {pdf:'application/pdf',jpg:'image/jpeg',jpeg:'image/jpeg',
    png:'image/png',gif:'image/gif',webp:'image/webp',
    doc:'application/msword',docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    ppt:'application/vnd.ms-powerpoint',pptx:'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    mp4:'video/mp4',mp3:'audio/mpeg',zip:'application/zip',txt:'text/plain'};
  return m[ext] || 'application/octet-stream';
}

// ── FS API + 권한 캐싱 (IndexedDB) + 폴링 ──

const IDB_NAME = 'amki_fs_cache';
const IDB_STORE = 'handles';
let pollTimer = null;
let lastSnapshotKey = '';   // 파일 목록의 해시값 (변경 감지용)

// IndexedDB helper
function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbSet(key, val) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function idbGet(key) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const req = db.transaction(IDB_STORE).objectStore(IDB_STORE).get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = rej;
  });
}
async function idbDel(key) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = res; tx.onerror = rej;
  });
}

// 앱 시작 시 캐시된 핸들 복원 시도
async function tryRestoreFSHandle() {
  if (!('showDirectoryPicker' in window)) return;
  try {
    const handle = await idbGet('rootHandle');
    if (!handle) return;
    // 권한 확인 (사용자 제스처 없이는 'granted' 못 받을 수도 있음)
    const perm = await handle.queryPermission({ mode: 'read' });
    if (perm === 'granted') {
      fsRootHandle = handle;
      setFSConnected(handle.name);
      await syncFromFS(true); // silent=true
    } else if (perm === 'prompt') {
      // 배너로 재연동 유도
      showReconnectBanner(handle);
    }
  } catch(e) { /* 핸들 만료 등 무시 */ }
}

function showReconnectBanner(cachedHandle) {
  document.getElementById('fs-status').innerHTML =
    `<span style="cursor:pointer;color:var(--lib-accent);text-decoration:underline"
      onclick="reRequestPermission()">이전 폴더 재연결 →</span>`;
  // 버튼 클릭 시 permission request
  window._cachedHandle = cachedHandle;
}

async function reRequestPermission() {
  try {
    const handle = window._cachedHandle;
    const perm = await handle.requestPermission({ mode: 'read' });
    if (perm === 'granted') {
      fsRootHandle = handle;
      setFSConnected(handle.name);
      await syncFromFS(false);
    }
  } catch(e) { toast('권한 요청 실패'); }
}

async function connectLocalFolder() {
  if (!('showDirectoryPicker' in window)) { toast('Chrome/Edge 86+ 필요'); return; }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'read' });
    fsRootHandle = handle;
    await idbSet('rootHandle', handle);   // 캐시 저장
    setFSConnected(handle.name);
    await syncFromFS(false);
  } catch(e) {
    if (e.name !== 'AbortError') toast('폴더 연동 실패: ' + e.message);
  }
}

function setFSConnected(name) {
  const btn = document.getElementById('connect-btn');
  btn.classList.add('connected');
  btn.innerHTML = `✅ ${esc(name)}`;
  document.getElementById('sync-btn').style.display = 'block';

  startPolling();
}

function manualSync() {
  syncFromFS(false);
}

// 변경 감지: 파일 목록의 name+lastModified 해시
async function buildSnapshot() {
  if (!fsRootHandle) return '';
  const parts = [];
  try {
    for await (const [name, handle] of fsRootHandle.entries()) {
      if (handle.kind === 'file') {
        const f = await handle.getFile();
        parts.push(`${name}:${f.lastModified}`);
      } else if (handle.kind === 'directory') {
        for await (const [fname, fh] of handle.entries()) {
          if (fh.kind === 'file') {
            const f = await fh.getFile();
            parts.push(`${name}/${fname}:${f.lastModified}`);
          }
        }
      }
    }
  } catch(e) {}
  return parts.sort().join('|');
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!fsRootHandle) return;
    const snap = await buildSnapshot();
    if (snap && snap !== lastSnapshotKey) {
      lastSnapshotKey = snap;
      await syncFromFS(true);  // 변경 감지 시 자동 조용히 동기화
    }
  }, 5000);  // 5초마다 체크
}

async function syncFromFS(silent = false) {
  if (!fsRootHandle) return;
  if (!silent) toast('동기화 중...');
  let added = 0;
  try {
    for await (const [name, handle] of fsRootHandle.entries()) {
      if (handle.kind === 'file') {
        const already = libState.files.find(f => f.name === name && f.fsLinked);
        if (!already) {
          const file = await handle.getFile();
          await addLibFile(file, '__unfiled__', true);
          added++;
        }
      } else if (handle.kind === 'directory') {
        let folder = libState.folders.find(f => f.name === name && f.fsLinked);
        if (!folder) {
          folder = { id: 'fold' + libState.nextId++, name, fsLinked: true };
          libState.folders.push(folder);
        }
        for await (const [fname, fh] of handle.entries()) {
          if (fh.kind === 'file') {
            const already = libState.files.find(f => f.name === fname && f.folderId === folder.id && f.fsLinked);
            if (!already) {
              const file = await fh.getFile();
              await addLibFile(file, folder.id, true);
              added++;
            }
          }
        }
      }
    }
    await saveLib(); renderLibrary();
    if (!silent) toast(`동기화 완료${added > 0 ? ` (+${added}개)` : ' (변경 없음)'}`);
    else if (added > 0) toast(`📂 +${added}개 파일 감지됨`);
    // 스냅샷 갱신
    lastSnapshotKey = await buildSnapshot();
  } catch(e) {
    if (!silent) toast('동기화 오류: ' + e.message);
  }
}

// ║  STUDY — FILE LOADING                    ║
// ╚══════════════════════════════════════════╝
async function loadFileIntoStudy(f) {
  showLoading(true);

  // dataURL이 없거나 __large__ 표시인 경우 → fsHandle로 직접 다시 읽기
  let dataURL = f.dataURL;
  if (!dataURL || dataURL === '__large__' || dataURL === '__error__') {
    dataURL = await reloadDataURLFromFS(f);
    if (dataURL) {
      // 캐시 업데이트
      f.dataURL = dataURL;
      saveLib().catch(()=>{});
    }
  }

  if (!dataURL || dataURL === '__large__' || dataURL === '__error__') {
    showLoading(false);
    toast('파일을 읽을 수 없습니다. 로컬 폴더가 연동되어 있는지 확인하세요.');
    return;
  }

  const isPDF = f.type === 'application/pdf'
    || f.name?.toLowerCase().endsWith('.pdf')
    || dataURL.startsWith('data:application/pdf');
  const isImg = f.type?.startsWith('image/') || dataURL.startsWith('data:image/');

  if (isPDF) {
    try {
      const b64 = dataURL.split(',')[1];
      if (!b64) throw new Error('base64 데이터 없음');
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
      totalPages = pdfDoc.numPages; isImgMode = false;
      await renderPage(1);
      updatePageInfo();
    } catch(e) {
      showLoading(false); toast('PDF 렌더링 실패: ' + e.message);
    }
  } else if (isImg) {
    loadImageDataURL(dataURL);
  } else {
    showLoading(false);
    toast('지원하지 않는 파일 형식입니다 (PDF, JPG, PNG만 가능)');
  }
}

// fsHandle 또는 fsRootHandle을 통해 파일을 다시 읽어 dataURL 반환
async function reloadDataURLFromFS(f) {
  if (!fsRootHandle) return null;
  try {
    // 파일이 속한 폴더를 찾아서 핸들 탐색
    const folder = libState.folders.find(fo => fo.id === f.folderId);
    let fileHandle = null;

    if (folder && folder.fsLinked) {
      // 하위 폴더에 있는 파일
      for await (const [name, handle] of fsRootHandle.entries()) {
        if (handle.kind === 'directory' && name === folder.name) {
          for await (const [fname, fh] of handle.entries()) {
            if (fh.kind === 'file' && fname === f.name) {
              fileHandle = fh; break;
            }
          }
          break;
        }
      }
    } else {
      // 루트에 있는 파일
      for await (const [name, handle] of fsRootHandle.entries()) {
        if (handle.kind === 'file' && name === f.name) {
          fileHandle = handle; break;
        }
      }
    }

    if (!fileHandle) return null;
    const file = await fileHandle.getFile();
    return await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  } catch(e) {
    return null;
  }
}

function loadImageDataURL(dataURL) {
  const img = new Image();
  img.onload = () => {
    isImgMode = true; pdfDoc = null; totalPages = 1; currentPage = 1;
    const c = document.getElementById('pdf-canvas');
    const ctx = c.getContext('2d');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    canvasW = img.naturalWidth; canvasH = img.naturalHeight;
    showCanvas(); zoomFit(); updatePageInfo(); renderBoxes(); updateBoxList();
  };
  img.src = dataURL;
}

async function renderPage(num) {
  if (!pdfDoc) return;
  showLoading(true);
  try {
    const page = await pdfDoc.getPage(num);
    const vp = page.getViewport({ scale: renderScale });
    const c = document.getElementById('pdf-canvas');
    c.width = vp.width; c.height = vp.height;
    canvasW = vp.width; canvasH = vp.height;
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
    showLoading(false); showCanvas(); zoomFit(); renderBoxes(); updateBoxList();
  } catch(e) { showLoading(false); toast('페이지 렌더링 실패'); }
}

function showLoading(v) { document.getElementById('pdf-loading').classList.toggle('show', v); }
function showCanvas() {
  document.getElementById('canvas-wrap').style.display = 'block';
  document.getElementById('zoom-ctrls').classList.add('show');
}

function prevPage() {

  document.getElementById('mask-layer').innerHTML = '';
  clearHighlight();
  seqIndex = -1;
  renderPage(currentPage); updatePageInfo();

function nextPage() {

  clearHighlight();

}

// ╔══════════════════════════════════════════╗
// ║  STUDY — ZOOM & PAN                      ║
// ╚══════════════════════════════════════════╝
function applyTransform() {
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.left  = offsetX + 'px';
  wrap.style.top   = offsetY + 'px';
  wrap.style.width = (canvasW * displayScale) + 'px';
  wrap.style.height= (canvasH * displayScale) + 'px';
  document.getElementById('pdf-canvas').style.width  = (canvasW * displayScale) + 'px';
  document.getElementById('pdf-canvas').style.height = (canvasH * displayScale) + 'px';
  document.getElementById('mask-layer').style.width  = (canvasW * displayScale) + 'px';
  document.getElementById('mask-layer').style.height = (canvasH * displayScale) + 'px';
  document.getElementById('zoom-level').textContent  = Math.round(displayScale*100) + '%';
  repositionBoxEls();
}
function zoomFit() {
  if (!canvasW) return;
  const p = document.getElementById('canvas-panel');
  const s = Math.min((p.clientWidth-20)/canvasW, (p.clientHeight-20)/canvasH);
  displayScale = s;
  offsetX = (p.clientWidth  - canvasW * s) / 2;
  offsetY = (p.clientHeight - canvasH * s) / 2;
  applyTransform();
}
function zoomIn()  { zoomAt(window.innerWidth/2, window.innerHeight/2, 1.2); }
function zoomOut() { zoomAt(window.innerWidth/2, window.innerHeight/2, 1/1.2); }
function zoomAt(sx, sy, f) {
  const ns = Math.min(6, Math.max(0.08, displayScale * f));
  const r  = ns / displayScale;
  offsetX  = sx - (sx - offsetX) * r;
  offsetY  = sy - (sy - offsetY) * r;
  displayScale = ns; applyTransform();
}

const canvasPanel = document.getElementById('canvas-panel');
canvasPanel.addEventListener('wheel', e => {
  if (currentMode === 'pan' || e.ctrlKey) {
    e.preventDefault();
    const rect = canvasPanel.getBoundingClientRect();
    zoomAt(e.clientX - rect.left, e.clientY - rect.top, e.deltaY < 0 ? 1.12 : 1/1.12);
  }
}, { passive: false });

function screenToCanvas(sx, sy) {
  const rect = canvasPanel.getBoundingClientRect();
  return { x: (sx - rect.left - offsetX) / displayScale,
           y: (sy - rect.top  - offsetY) / displayScale };
}

// ╔══════════════════════════════════════════╗
// ║  STUDY — MOUSE + TOUCH                   ║
// ╚══════════════════════════════════════════╝
canvasPanel.addEventListener('mousedown', onMD);
canvasPanel.addEventListener('mousemove', onMM);
canvasPanel.addEventListener('mouseup',   onMU);
canvasPanel.addEventListener('contextmenu', e => e.preventDefault());

// 터치 이벤트
canvasPanel.addEventListener('touchstart',  onTouchStart,  { passive: false });
canvasPanel.addEventListener('touchmove',   onTouchMove,   { passive: false });
canvasPanel.addEventListener('touchend',    onTouchEnd,    { passive: false });
canvasPanel.addEventListener('touchcancel', onTouchCancel, { passive: false });

// 핀치 줌 상태
let pinchDist0 = null;
let pinchScale0 = null;
let longPressTimer = null;
let touchMoved = false;

function getTouchDist(t1, t2) {
  const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchMid(t1, t2) {
  return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
}

function onTouchStart(e) {
  e.preventDefault();
  closeCtxMenu();
  touchMoved = false;

  if (e.touches.length === 2) {
    // 핀치 줌 시작
    clearLongPress();
    isDragging = false;
    isPanning  = false;
    document.getElementById('drag-rect').style.display = 'none';
    pinchDist0  = getTouchDist(e.touches[0], e.touches[1]);
    pinchScale0 = displayScale;
    return;
  }

  if (e.touches.length !== 1) return;
  const t = e.touches[0];

  // 메모 버튼 터치
  if (t.target.classList.contains('mb-memo-btn')) return;

  // 박스 위 터치 → 탭이면 토글 (롱프레스면 컨텍스트 메뉴)
  const box = t.target.closest('.mask-box');
  if (box && currentMode === 'draw') {
    longPressTimer = setTimeout(() => {
      if (!touchMoved) {
        ctxTarget = parseInt(box.dataset.id);
        showCtxMenu(t.clientX, t.clientY);
      }
    }, 500);
    // touchend에서 짧으면 토글 처리
    return;
  }

  if (currentMode === 'draw') {
    isDragging = true;
    const wrap = document.getElementById('canvas-wrap');
    const wr   = wrap.getBoundingClientRect();
    dragStart  = { sx: t.clientX - wr.left, sy: t.clientY - wr.top };
    const dr   = document.getElementById('drag-rect');
    dr.style.cssText = `display:block;left:${dragStart.sx}px;top:${dragStart.sy}px;width:0;height:0`;
  } else {
    isPanning = true;
    panStart  = { x: t.clientX - offsetX, y: t.clientY - offsetY };
  }
}

function onTouchMove(e) {
  e.preventDefault();
  touchMoved = true;
  clearLongPress();

  if (e.touches.length === 2 && pinchDist0 !== null) {
    // 핀치 줌
    const dist = getTouchDist(e.touches[0], e.touches[1]);
    const mid  = getTouchMid(e.touches[0], e.touches[1]);
    const rect = canvasPanel.getBoundingClientRect();
    const factor = dist / pinchDist0;
    const ns = Math.min(6, Math.max(0.08, pinchScale0 * factor));
    const r  = ns / displayScale;
    offsetX  = (mid.x - rect.left) - ((mid.x - rect.left) - offsetX) * r;
    offsetY  = (mid.y - rect.top)  - ((mid.y - rect.top)  - offsetY) * r;
    displayScale = ns;
    applyTransform();
    return;
  }

  if (e.touches.length !== 1) return;
  const t = e.touches[0];

  if (isDragging) {
    const wrap = document.getElementById('canvas-wrap');
    const wr   = wrap.getBoundingClientRect();
    const cx   = t.clientX - wr.left, cy = t.clientY - wr.top;
    const x    = Math.min(dragStart.sx, cx), y = Math.min(dragStart.sy, cy);
    const dr   = document.getElementById('drag-rect');
    dr.style.left   = x + 'px'; dr.style.top    = y + 'px';
    dr.style.width  = Math.abs(cx - dragStart.sx) + 'px';
    dr.style.height = Math.abs(cy - dragStart.sy) + 'px';
  } else if (isPanning) {
    offsetX = t.clientX - panStart.x;
    offsetY = t.clientY - panStart.y;
    applyTransform();
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  const wasLongPress = longPressTimer === null && !touchMoved;
  clearLongPress();
  pinchDist0 = null; pinchScale0 = null;

  // 박스 탭 처리 (touchMoved 없고 타이머 안 터진 경우)
  if (e.changedTouches.length === 1 && !touchMoved) {
    const t   = e.changedTouches[0];
    const box = t.target.closest?.('.mask-box');
    if (box && currentMode === 'draw' && !wasLongPress) {
      toggleReveal(parseInt(box.dataset.id));
      isDragging = false;
      return;
    }
  }

  if (isDragging) {
    isDragging = false;
    document.getElementById('drag-rect').style.display = 'none';
    if (e.changedTouches.length === 1) {
      const t  = e.changedTouches[0];
      const wrap = document.getElementById('canvas-wrap');
      const wr   = wrap.getBoundingClientRect();
      const cx   = t.clientX - wr.left, cy = t.clientY - wr.top;
      const x    = Math.min(dragStart.sx, cx) / displayScale;
      const y    = Math.min(dragStart.sy, cy) / displayScale;
      const w    = Math.abs(cx - dragStart.sx) / displayScale;
      const h    = Math.abs(cy - dragStart.sy) / displayScale;
      if (w > 8 && h > 8) addBox(x, y, w, h);
    }
  } else if (isPanning) {
    isPanning = false;
  }
}

function onTouchCancel(e) {
  clearLongPress();
  isDragging = false; isPanning = false;
  pinchDist0 = null;
  document.getElementById('drag-rect').style.display = 'none';
}

function clearLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

// 마우스 이벤트 (기존 그대로)
function onMD(e) {
  if (e.button === 2) return;
  closeCtxMenu();
  if (e.target.classList.contains('mb-memo-btn')) return;
  if (e.target.closest('.mask-box') && currentMode === 'draw') {
    toggleReveal(parseInt(e.target.closest('.mask-box').dataset.id));
    return;
  }
  if (currentMode === 'draw') {
    isDragging = true;
    const pt = screenToCanvas(e.clientX, e.clientY);
    const wrap = document.getElementById('canvas-wrap');
    const wr = wrap.getBoundingClientRect();
    dragStart = { cx: pt.x, cy: pt.y, sx: e.clientX - wr.left, sy: e.clientY - wr.top };
    const dr = document.getElementById('drag-rect');
    dr.style.cssText = `display:block;left:${dragStart.sx}px;top:${dragStart.sy}px;width:0;height:0`;
  } else {
    isPanning = true;
    panStart = { x: e.clientX - offsetX, y: e.clientY - offsetY };
    canvasPanel.style.cursor = 'grabbing';
  }
}
function onMM(e) {
  if (isDragging) {
    const wrap = document.getElementById('canvas-wrap');
    const wr = wrap.getBoundingClientRect();
    const cx = e.clientX - wr.left, cy = e.clientY - wr.top;
    const x = Math.min(dragStart.sx, cx), y = Math.min(dragStart.sy, cy);
    const dr = document.getElementById('drag-rect');
    dr.style.left=x+'px'; dr.style.top=y+'px';
    dr.style.width=Math.abs(cx-dragStart.sx)+'px';
    dr.style.height=Math.abs(cy-dragStart.sy)+'px';
  } else if (isPanning) {
    offsetX = e.clientX - panStart.x;
    offsetY = e.clientY - panStart.y;
    applyTransform();
  }
}
function onMU(e) {
  if (isDragging) {
    isDragging = false;
    document.getElementById('drag-rect').style.display = 'none';
    const wrap = document.getElementById('canvas-wrap');
    const wr = wrap.getBoundingClientRect();
    const cx = e.clientX - wr.left, cy = e.clientY - wr.top;
    const x = Math.min(dragStart.sx, cx) / displayScale;
    const y = Math.min(dragStart.sy, cy) / displayScale;
    const w = Math.abs(cx - dragStart.sx) / displayScale;
    const h = Math.abs(cy - dragStart.sy) / displayScale;
    if (w > 8 && h > 8) addBox(x, y, w, h);
  } else if (isPanning) {
    isPanning = false; canvasPanel.style.cursor = '';
  }
}

document.getElementById('mask-layer').addEventListener('contextmenu', e => {
  e.preventDefault();
  const box = e.target.closest('.mask-box');
  if (!box) return;
  ctxTarget = parseInt(box.dataset.id);
  showCtxMenu(e.clientX, e.clientY);
});

// ╔══════════════════════════════════════════╗
// ║  STUDY — BOXES                           ║
// ╚══════════════════════════════════════════╝
function pageKey() { return `${activeFileId}_${currentPage}`; }
function getPageBoxes() {
  if (!boxes[pageKey()]) boxes[pageKey()] = [];
  return boxes[pageKey()];
}
function getBox(id) { return getPageBoxes().find(b => b.id === id); }

// 현재 하이라이트 인덱스 (페이지 내 순서)
// 상태: -1 = 아무것도 안 함, N = N번째 박스 하이라이트 중
// 2단계: highlighted(가려짐) → SPACE → revealed + 다음 박스 highlighted

function addBox(x, y, w, h) {
  const pb = getPageBoxes();
  const id = boxNextId++;
  pb.push({ id, x, y, w, h, memo:'', revealed:false });
  saveBoxes(); renderBoxes(); updateBoxList(); renderLibrary();
}

function toggleReveal(id) {
  const b = getBox(id); if (!b) return;
  b.revealed = !b.revealed;
  const el = document.querySelector(`.mask-box[data-id="${id}"]`);
  if (el) el.classList.toggle('revealed', b.revealed);
  saveBoxes(); updateBoxList(); updateProgress();
}

// 하이라이트 이동 (1단계)
// SPACE → 현재 하이라이트 박스 열기 + 다음 박스 하이라이트
function nextBox() {
  const pb = getPageBoxes();
  if (!pb.length) return;

  const curHL = document.querySelector('.mask-box.highlighted');
  if (curHL) {
    const id = parseInt(curHL.dataset.id);
    const b  = getBox(id);
    if (b && !b.revealed) {
      b.revealed = true;
      curHL.classList.add('revealed');
      saveBoxes();
    }
    moveHighlightForward(pb, id);
  } else {
    const first = pb.find(b => !b.revealed);
    if (!first) { toast('모두 열렸습니다 ✓'); return; }
    setHighlight(first.id);
  }
  updateBoxList(); updateProgress();
}

function moveHighlightForward(pb, currentId) {
  const idx = pb.findIndex(b => b.id === currentId);
  // idx 이후 미열람 박스 탐색
  for (let i = idx + 1; i < pb.length; i++) {
    if (!pb[i].revealed) { setHighlight(pb[i].id); return; }
  }
  // 없으면 하이라이트 해제
  clearHighlight();
  updateProgress();
  const remaining = pb.filter(b => !b.revealed).length;
  if (remaining === 0) toast('모두 열렸습니다 ✓');
}

function prevBox() {
  const pb = getPageBoxes();
  if (!pb.length) return;
  const curHL = document.querySelector('.mask-box.highlighted');

  // 현재 하이라이트가 있으면: 열려 있다면 닫고 이전으로, 안 열려 있으면 그냥 이전으로
  if (curHL) {
    const id = parseInt(curHL.dataset.id);
    const b  = getBox(id);
    if (b?.revealed) {
      b.revealed = false;
      curHL.classList.remove('revealed');
      saveBoxes();
    }
    const idx = pb.findIndex(b => b.id === id);
    if (idx > 0) {
      // 이전 박스 닫고 하이라이트
      const prev = pb[idx - 1];
      prev.revealed = false;
      const prevEl = document.querySelector(`.mask-box[data-id="${prev.id}"]`);
      if (prevEl) prevEl.classList.remove('revealed');
      saveBoxes();
      setHighlight(prev.id);
    } else {
      clearHighlight();
    }
  } else {
    // 하이라이트 없음 → 마지막 열린 박스 닫고 하이라이트
    const last = [...pb].reverse().find(b => b.revealed);
    if (!last) return;
    last.revealed = false;
    const el = document.querySelector(`.mask-box[data-id="${last.id}"]`);
    if (el) el.classList.remove('revealed');
    saveBoxes();
    setHighlight(last.id);
  }
  updateBoxList(); updateProgress();
}

function setHighlight(id) {
  clearHighlight();
  const el = document.querySelector(`.mask-box[data-id="${id}"]`);
  if (el) {
    el.classList.add('highlighted');
    // 캔버스 영역에서 박스가 보이도록 스크롤 없이 살짝 표시
    el.scrollIntoView && el.scrollIntoView({ block: 'nearest' });
  }
}

function clearHighlight() {
  document.querySelectorAll('.mask-box.highlighted').forEach(e => e.classList.remove('highlighted'));
}

function quizReset() {
  // 전체 가리기 + 하이라이트 초기화
  getPageBoxes().forEach(b => b.revealed = false);
  clearHighlight();
  seqIndex = -1;
  saveBoxes(); renderBoxes(); updateBoxList(); updateProgress();
}

function revealAll() {
  clearHighlight();
  getPageBoxes().forEach(b => b.revealed = true);
  saveBoxes(); renderBoxes(); updateBoxList(); updateProgress();
}

function updateProgress() {
  const pb = getPageBoxes();
  const done = pb.filter(b => b.revealed).length;
  const el = document.getElementById('quiz-progress');
  if (el) el.textContent = pb.length ? `${done} / ${pb.length} 완료` : '— / — 완료';
}

function deleteBox(id) {
  const k = pageKey();
  if (boxes[k]) boxes[k] = boxes[k].filter(b => b.id !== id);
  clearHighlight();
  saveBoxes(); renderBoxes(); updateBoxList(); updateProgress(); renderLibrary();
}
function clearAllBoxes() {
  if (!confirm('현재 페이지의 모든 박스를 삭제할까요?')) return;
  boxes[pageKey()] = [];
  clearHighlight();
  saveBoxes(); renderBoxes(); updateBoxList(); updateProgress(); renderLibrary();
}

function renderBoxes() {
  const layer = document.getElementById('mask-layer');
  layer.innerHTML = '';
  getPageBoxes().forEach((b, idx) => {
    const el = document.createElement('div');
    el.className = 'mask-box' + (b.revealed ? ' revealed' : '') + (b.memo ? ' has-memo' : '');
    el.dataset.id = b.id;
    el.style.cssText = `left:${b.x*displayScale}px;top:${b.y*displayScale}px;width:${b.w*displayScale}px;height:${b.h*displayScale}px`;

    const lbl = document.createElement('div');
    lbl.className = 'mb-lbl'; lbl.textContent = idx + 1;
    el.appendChild(lbl);

    const mb = document.createElement('button');
    mb.className = 'mb-memo-btn';
    mb.title = b.memo ? '메모 있음' : '메모 추가';
    mb.textContent = b.memo ? '📝' : '✎';
    mb.addEventListener('click', ev => { ev.stopPropagation(); openMemo(b.id); });
    el.appendChild(mb);

    el.addEventListener('click', ev => {
      if (ev.target.classList.contains('mb-memo-btn')) return;
      toggleReveal(b.id);
    });
    el.addEventListener('contextmenu', ev => {
      ev.preventDefault(); ev.stopPropagation();
      ctxTarget = b.id; showCtxMenu(ev.clientX, ev.clientY);
    });
    layer.appendChild(el);
  });
  updateProgress();
}

function repositionBoxEls() {
  const pb = getPageBoxes();
  document.querySelectorAll('.mask-box').forEach(el => {
    const b = pb.find(b => b.id === parseInt(el.dataset.id));
    if (!b) return;
    el.style.left  = (b.x*displayScale)+'px'; el.style.top    = (b.y*displayScale)+'px';
    el.style.width = (b.w*displayScale)+'px'; el.style.height = (b.h*displayScale)+'px';
  });
}

function updateBoxList() {
  const list = document.getElementById('box-list');
  const none = document.getElementById('no-boxes');
  const pb = getPageBoxes();
  if (!pb.length) { list.innerHTML=''; none.style.display='block'; return; }
  none.style.display = 'none';
  list.innerHTML = pb.map((b,i) => `
    <div class="box-item ${b.revealed?'revealed':''}" onclick="toggleReveal(${b.id});updateBoxList();updateProgress()">
      <div class="bi-num">${i+1}</div>
      <div class="bi-lbl">${b.memo ? esc(b.memo.split('\n')[0].slice(0,18)) : `박스 ${i+1}`}</div>
      <div class="bi-state">${b.revealed?'👁':'🔒'}</div>
      <button class="bi-del" onclick="event.stopPropagation();deleteBox(${b.id})">✕</button>
    </div>`).join('');
}

function setDrawMode() {
  currentMode = 'draw';

  document.getElementById('btn-pan').classList.remove('active');

  document.getElementById('btn-draw').classList.remove('active');

function selectGroup(g) {

// ╔══════════════════════════════════════════╗
// ║  STUDY — CTX MENU                        ║
// ╚══════════════════════════════════════════╝
function showCtxMenu(x, y) {
  const m = document.getElementById('ctx-menu');
  m.style.left=x+'px'; m.style.top=y+'px';
  m.classList.add('open');
  setTimeout(() => document.addEventListener('click', closeCtxMenu, {once:true}), 0);
}
function closeCtxMenu() { document.getElementById('ctx-menu').classList.remove('open'); }
function ctxReveal() { if(ctxTarget!=null) toggleReveal(ctxTarget); closeCtxMenu(); }
function ctxMemo()   { if(ctxTarget!=null) openMemo(ctxTarget);    closeCtxMenu(); }
function ctxSetGroup(g) {
  if(ctxTarget==null) return;
  const b = getBox(ctxTarget); if(!b) return;
  b.group = g==='none'?null:g;
  saveBoxes(); renderBoxes(); updateBoxList(); closeCtxMenu();
}
function ctxDelete() { if(ctxTarget!=null) deleteBox(ctxTarget); closeCtxMenu(); }

// ╔══════════════════════════════════════════╗
// ║  STUDY — MEMO                            ║
// ╚══════════════════════════════════════════╝
function openMemo(id) {
  memoTarget = id;
  const b = getBox(id);
  document.getElementById('memo-ta').value = b?.memo||'';
  const popup = document.getElementById('memo-popup');
  const el = document.querySelector(`.mask-box[data-id="${id}"]`);
  if (el) {
    const r = el.getBoundingClientRect();
    popup.style.left = Math.min(r.right+8, window.innerWidth-240)+'px';
    popup.style.top  = Math.max(r.top, 50)+'px';
    popup.style.transform = '';
  } else {
    popup.style.left='50%'; popup.style.top='50%'; popup.style.transform='translate(-50%,-50%)';
  }
  popup.classList.add('open');
  document.getElementById('memo-ta').focus();
}
function closeMemo() { document.getElementById('memo-popup').classList.remove('open'); memoTarget=null; }
function saveMemo() {
  if(memoTarget==null) return;
  const b = getBox(memoTarget); if(!b) return;
  b.memo = document.getElementById('memo-ta').value.trim();
  saveBoxes(); renderBoxes(); updateBoxList(); closeMemo(); toast('메모 저장됨');
}

// ╔══════════════════════════════════════════╗
// ║  STORAGE  (IndexedDB 기반)               ║
// ╚══════════════════════════════════════════╝
// IDB_NAME/IDB_STORE는 FS 캐시와 같은 DB를 공유, 스토어만 분리
const IDB_DATA_STORE  = 'dataURLs';   // fileId → dataURL
const IDB_META_STORE  = 'meta';       // 'libState' / 'boxState' → JSON
const IDB_BOXES_STORE = 'boxState';

let _db = null;
async function getDB() {
  if (_db) return _db;
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      // FS 핸들 스토어 (이미 있을 수 있음)
      if (!db.objectStoreNames.contains(IDB_STORE))      db.createObjectStore(IDB_STORE);
      // 새 스토어들
      if (!db.objectStoreNames.contains(IDB_DATA_STORE)) db.createObjectStore(IDB_DATA_STORE);
      if (!db.objectStoreNames.contains(IDB_META_STORE)) db.createObjectStore(IDB_META_STORE);
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror   = e => rej(e.target.error);
  });
}

async function idbSetStore(store, key, val) {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(val, key);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function idbGetStore(store, key) {
  const db = await getDB();
  return new Promise((res, rej) => {
    const req = db.transaction(store).objectStore(store).get(key);
    req.onsuccess = e => res(e.target.result ?? null);
    req.onerror   = rej;
  });
}
async function idbDelStore(store, key) {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = res; tx.onerror = rej;
  });
}

// ── idbSet/idbGet 기존 함수도 새 getDB() 사용으로 통일 ──
async function idbSet(key, val) { return idbSetStore(IDB_STORE, key, val); }
async function idbGet(key)      { return idbGetStore(IDB_STORE, key); }

// ── 라이브러리 저장/로드 ──
async function saveLib() {
  setSyncStatus('syncing');
  // 1) IDB 백업 (오프라인 폴백)
  const meta = {
    folders: libState.folders,
    files:   libState.files.map(f => ({ ...f, dataURL: undefined })),
    nextId:  libState.nextId
  };
  await idbSetStore(IDB_META_STORE, 'libState', meta).catch(()=>{});
  for (const f of libState.files) {
    if (f.dataURL && f.dataURL !== '__large__' && f.dataURL !== '__error__') {
      await idbSetStore(IDB_DATA_STORE, f.id, f.dataURL).catch(()=>{});
    }
  }
  // 2) Supabase upsert
  try {
    if (libState.folders.length > 0) {
      await sbFetch('/folders', {
        method: 'POST', prefer: 'resolution=merge-duplicates',
        body: JSON.stringify(libState.folders.map(f => ({
          id: f.id, name: f.name, fs_linked: f.fsLinked || false
        })))
      });
    }
    if (libState.files.length > 0) {
      await sbFetch('/files', {
        method: 'POST', prefer: 'resolution=merge-duplicates',
        body: JSON.stringify(libState.files.map(f => ({
          id: f.id, name: f.name, type: f.type, size: f.size,
          added_at: f.addedAt, folder_id: f.folderId,
          data_url: f.dataURL || null,
          fs_linked: f.fsLinked || false,
          updated_at: new Date().toISOString()
        })))
      });
    }
    sbOnline = true; setSyncStatus('ok');
  } catch(e) { sbOnline = false; setSyncStatus('offline'); }
}

async function loadLib() {
  // Supabase 우선
  try {
    const [foldersRes, filesRes] = await Promise.all([
      sbFetch('/folders?select=*'),
      sbFetch('/files?select=*')
    ]);
    libState.folders = (foldersRes || []).map(r => ({ id: r.id, name: r.name, fsLinked: r.fs_linked }));
    libState.files   = (filesRes   || []).map(r => ({
      id: r.id, name: r.name, type: r.type, size: r.size,
      addedAt: r.added_at, folderId: r.folder_id,
      dataURL: r.data_url, fsLinked: r.fs_linked
    }));
    const allIds    = libState.files.map(f   => parseInt(f.id.replace('f',''))   || 0);
    const folderIds = libState.folders.map(f => parseInt(f.id.replace('fold',''))|| 0);
    libState.nextId = Math.max(1, ...allIds, ...folderIds) + 1;
    sbOnline = true;
    // IDB 백업
    const meta = { folders: libState.folders, files: libState.files.map(f=>({...f,dataURL:undefined})), nextId: libState.nextId };
    await idbSetStore(IDB_META_STORE, 'libState', meta).catch(()=>{});
    for (const f of libState.files) {
      if (f.dataURL) await idbSetStore(IDB_DATA_STORE, f.id, f.dataURL).catch(()=>{});
    }
    return;
  } catch(e) { sbOnline = false; }

  // IDB 폴백
  const meta = await idbGetStore(IDB_META_STORE, 'libState').catch(()=>null);
  if (meta) {
    if (meta.folders) libState.folders = meta.folders;
    if (meta.nextId)  libState.nextId  = meta.nextId;
    if (meta.files) {
      libState.files = await Promise.all(meta.files.map(async f => {
        const dataURL = await idbGetStore(IDB_DATA_STORE, f.id).catch(() => null);
        return { ...f, dataURL: dataURL || null };
      }));
    }
    return;
  }
  // 구버전 localStorage 마이그레이션
  try {
    const r = localStorage.getItem(LIB_KEY);
    if (r) {
      const d = JSON.parse(r);
      if (d.folders) libState.folders = d.folders;
      if (d.files)   libState.files   = d.files;
      if (d.nextId)  libState.nextId  = d.nextId;
      await saveLib(); localStorage.removeItem(LIB_KEY);
    }
  } catch(e) {}
}

// ── 박스 저장/로드 ──
async function saveBoxes() {
  setSyncStatus('syncing');
  await idbSetStore(IDB_META_STORE, 'boxState', { boxes, boxNextId }).catch(()=>{});
  localStorage.removeItem(BOXES_KEY);
  try {
    await sbFetch('/boxes', {
      method: 'POST', prefer: 'resolution=merge-duplicates',
      body: JSON.stringify([{ id: 'global', data: boxes, box_next_id: boxNextId, updated_at: new Date().toISOString() }])
    });
    sbOnline = true; setSyncStatus('ok');
  } catch(e) { sbOnline = false; setSyncStatus('offline'); }
}

async function loadBoxes() {
  try {
    const res = await sbFetch('/boxes?id=eq.global&select=*');
    if (res && res.length > 0) {
      boxes = res[0].data || {}; boxNextId = res[0].box_next_id || 1;
      sbOnline = true;
      await idbSetStore(IDB_META_STORE, 'boxState', { boxes, boxNextId }).catch(()=>{});
      return;
    }
  } catch(e) { sbOnline = false; }
  // IDB 폴백
  const d = await idbGetStore(IDB_META_STORE, 'boxState').catch(()=>null);
  if (d) { if (d.boxes) boxes = d.boxes; if (d.boxNextId) boxNextId = d.boxNextId; return; }
  // localStorage 마이그레이션
  try {
    const r = localStorage.getItem(BOXES_KEY);
    if (r) {
      const d2 = JSON.parse(r);
      if (d2.boxes) boxes = d2.boxes; if (d2.boxNextId) boxNextId = d2.boxNextId;
      await saveBoxes(); localStorage.removeItem(BOXES_KEY);
    }
  } catch(e) {}
}

// ║  KEYBOARD                                ║
// ╚══════════════════════════════════════════╝
document.addEventListener('keydown', e => {
  const tag = e.target.tagName;
  const inStudy = !document.getElementById('screen-study').classList.contains('hidden');

  if (tag==='INPUT'||tag==='TEXTAREA') return;

  if (!inStudy) {
    if (e.key==='Escape') { clearSel(); closeMoveModal(); }
    return;
  }

  switch(e.key) {
    case ' ':      e.preventDefault(); nextBox(); break;
    case 'h':case'H': quizReset(); break;
    case 'r':case'R': revealAll(); break;
    case 'ArrowLeft':  e.preventDefault(); prevPage(); break;
    case 'ArrowRight': e.preventDefault(); nextPage(); break;
    case 'd':case'D':  setDrawMode(); break;
    case 'p':case'P':  setPanMode();  break;
    case '+':case'=':  zoomIn();  break;
    case '-':          zoomOut(); break;
    case '0':          zoomFit(); break;
    case 'Escape': closeMemo(); closeCtxMenu(); closeIO(); break;
    case 'Backspace':case'Delete': {
      const pb = getPageBoxes();
      if(pb.length) deleteBox(pb[pb.length-1].id);
      break;
    }
  }
});

function typeIcon(type, name) {
  if (!type) type = guessType(name||'');
  if (type.startsWith('image/')) return '🖼';
  if (type==='application/pdf') return '📕';
  if (type.includes('word')) return '📘';
  if (type.includes('presentation')||type.includes('powerpoint')) return '📙';
  if (type.includes('spreadsheet')||type.includes('excel')) return '📗';
  if (type.startsWith('video/')) return '🎬';
  if (type.startsWith('audio/')) return '🎵';
  if (type.includes('zip')||type.includes('archive')) return '📦';
  if (type.startsWith('text/')) return '📄';
  return '📎';
}
function extLabel(name) { const p=name.split('.'); return p.length<2?'파일':p.pop().toUpperCase(); }
function fmtSize(b) {
  if(!b&&b!==0) return '—';
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
function fmtDate(iso) {
  if(!iso) return '—';
  const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()}`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}
